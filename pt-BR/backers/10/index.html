<div class="container" style="max-width:720px;margin:60px auto;padding:0 20px;">
  <h2></h2>
</div>


  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

  <script>
  // 언어 선택 드롭다운 클릭 시 수동 선택 플래그 저장
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.dropdown-menu .dropdown-item').forEach(function(el) {
      el.addEventListener('click', function() {
        localStorage.setItem('petit_lang_set', '1');
      });
    });
  });

  // 자동 언어 감지 (수동 선택 시 스킵)
  (async function() {
    if (window.location.pathname !== '/') return;
    if (localStorage.getItem('petit_lang_set')) return;

    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    var map = {
      'ko': '/ko', 'ja': '/ja', 'zh-cn': '/zh-Hans', 'zh-hans': '/zh-Hans', 'zh': '/zh-Hans',
      'es': '/es', 'de': '/de', 'pt-br': '/pt-BR', 'pt': '/pt-BR',
      'fr': '/fr', 'tr': '/tr'
    };
    var redirect = map[lang] || map[lang.split('-')[0]];

    // 브라우저 언어로 감지 못한 경우 IP 기반 시도
    if (!redirect) {
      try {
        var res = await fetch('https://ipapi.co/json/');
        var data = await res.json();
        var countryMap = {
          'KR': '/ko',
          'JP': '/ja',
          'CN': '/zh-Hans', 'TW': '/zh-Hans', 'HK': '/zh-Hans',
          'ES': '/es', 'MX': '/es', 'AR': '/es', 'CO': '/es', 'PE': '/es', 'CL': '/es',
          'DE': '/de', 'AT': '/de', 'CH': '/de',
          'FR': '/fr', 'BE': '/fr',
          'TR': '/tr',
          'BR': '/pt-BR', 'PT': '/pt-BR'
        };
        redirect = countryMap[data.country_code] || null;
      } catch(e) {}
    }

    if (redirect) window.location.replace(redirect);
  })();
  </script>
